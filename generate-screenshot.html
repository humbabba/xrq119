<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { border: 1px solid #333; }
</style>
</head>
<body>
<canvas id="c" width="1200" height="900"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1200, H = 900;

// Load font first
const font = new FontFace('JetBrains Mono', 'url(assets/fonts/jetbrains-mono-latin.woff2)');
font.load().then(f => {
  document.fonts.add(f);
  render();
});

function render() {
  // Dark background
  ctx.fillStyle = '#0a0e17';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(6, 182, 212, 0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Code rain columns
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF<>/{}[]();:=+-*&|!?#@$%^~';
  const colW = 22;
  const cols = Math.ceil(W / colW);

  // Seed random for reproducibility
  let seed = 42;
  function rng() {
    seed = (seed * 16807 + 0) % 2147483647;
    return seed / 2147483647;
  }

  for (let col = 0; col < cols; col++) {
    const x = col * colW + colW / 2;
    const speed = 0.3 + rng() * 0.7;
    const offset = rng() * H * 2;
    const len = 8 + Math.floor(rng() * 20);

    for (let i = 0; i < len; i++) {
      const y = (offset + i * 20) % (H + 200) - 100;
      if (y < -20 || y > H + 20) continue;

      const charIdx = Math.floor(rng() * chars.length);
      const ch = chars[charIdx];

      // Fade: brightest at head (i=0), fading down
      const brightness = Math.max(0, 1 - i / len);
      const alpha = brightness * (0.4 + rng() * 0.5);

      // Color: bright cyan, head chars near white
      const headGlow = i === 0 ? 1 : 0;
      const r = Math.floor((6 + 200 * headGlow) * brightness);
      const g = Math.floor((210 + 45 * headGlow) * brightness + 30);
      const b = Math.floor((230 + 25 * headGlow) * brightness + 20);

      ctx.font = '14px "JetBrains Mono", monospace';
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
      ctx.textAlign = 'center';
      ctx.fillText(ch, x, y);
    }
  }

  // Add more scattered characters for density
  for (let i = 0; i < 900; i++) {
    const x = rng() * W;
    const y = rng() * H;
    const charIdx = Math.floor(rng() * chars.length);
    const ch = chars[charIdx];
    const alpha = 0.08 + rng() * 0.25;
    ctx.font = '14px "JetBrains Mono", monospace';
    ctx.fillStyle = `rgba(6, 182, 212, ${alpha})`;
    ctx.textAlign = 'center';
    ctx.fillText(ch, x, y);
  }

  // Scanline overlay
  for (let y = 0; y < H; y += 3) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
    ctx.fillRect(0, y, W, 1);
  }

  // Vignette
  const vg = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  // Corner brackets
  const bracketSize = 60;
  const bracketWeight = 3;
  const margin = 60;
  ctx.strokeStyle = 'rgba(6, 182, 212, 0.5)';
  ctx.lineWidth = bracketWeight;

  // Top-left
  ctx.beginPath();
  ctx.moveTo(margin, margin + bracketSize);
  ctx.lineTo(margin, margin);
  ctx.lineTo(margin + bracketSize, margin);
  ctx.stroke();

  // Top-right
  ctx.beginPath();
  ctx.moveTo(W - margin - bracketSize, margin);
  ctx.lineTo(W - margin, margin);
  ctx.lineTo(W - margin, margin + bracketSize);
  ctx.stroke();

  // Bottom-left
  ctx.beginPath();
  ctx.moveTo(margin, H - margin - bracketSize);
  ctx.lineTo(margin, H - margin);
  ctx.lineTo(margin + bracketSize, H - margin);
  ctx.stroke();

  // Bottom-right
  ctx.beginPath();
  ctx.moveTo(W - margin - bracketSize, H - margin);
  ctx.lineTo(W - margin, H - margin);
  ctx.lineTo(W - margin, H - margin - bracketSize);
  ctx.stroke();

  // Glow behind text
  const glow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 250);
  glow.addColorStop(0, 'rgba(6, 182, 212, 0.08)');
  glow.addColorStop(1, 'rgba(6, 182, 212, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // "xrq119" text
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Text shadow/glow
  ctx.shadowColor = 'rgba(6, 182, 212, 0.6)';
  ctx.shadowBlur = 40;
  ctx.font = '700 72px "JetBrains Mono", monospace';
  ctx.fillStyle = '#06b6d4';
  ctx.fillText('xrq119', W/2, H/2 - 20);

  // Second pass for sharper text
  ctx.shadowBlur = 15;
  ctx.fillText('xrq119', W/2, H/2 - 20);

  // Reset shadow
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.font = '400 18px "JetBrains Mono", monospace';
  ctx.fillStyle = 'rgba(6, 182, 212, 0.7)';
  ctx.fillText('W O R D P R E S S   T H E M E', W/2, H/2 + 40);

  // Download link
  const link = document.createElement('a');
  link.download = 'screenshot.png';
  link.href = canvas.toDataURL('image/png');
  link.textContent = 'Download screenshot.png';
  link.style.cssText = 'display:block;text-align:center;margin:20px;color:#06b6d4;font-family:monospace;font-size:18px;';
  document.body.appendChild(link);
}
</script>
</body>
</html>
